<div class="jit-widget widget-h-medium" data-widget="logs">

    <!-- ======================================== -->
    <!-- Header                                   -->
    <!-- ======================================== -->

    <div class="jit-widget-header">

        <div>

            <h5>Event Logs</h5>

            <small class="widget-subtitle">

                System Activity Monitor

            </small>

        </div>

        <div class="widget-header-actions">

            <button class="widget-button">

                Clear

            </button>

            <div class="widget-menu">

                <i class="fa-solid fa-ellipsis"></i>

            </div>

        </div>

    </div>

    <!-- ======================================== -->
    <!-- Body                                     -->
    <!-- ======================================== -->

    <div class="jit-widget-body">

        <div class="log-container">

            <div class="log-item info">

                <span class="log-time">20:14:22</span>

                <span class="log-level">INFO</span>

                <span class="log-message">

                    Dashboard initialized successfully.

                </span>

            </div>

            <div class="log-item success">

                <span class="log-time">20:14:35</span>

                <span class="log-level">SUCCESS</span>

                <span class="log-message">

                    Agent connected.

                </span>

            </div>

            <div class="log-item warning">

                <span class="log-time">20:15:01</span>

                <span class="log-level">WARNING</span>

                <span class="log-message">

                    CPU usage exceeded 80%.

                </span>

            </div>

            <div class="log-item error">

                <span class="log-time">20:15:08</span>

                <span class="log-level">ERROR</span>

                <span class="log-message">

                    Failed to fetch GPU information.

                </span>

            </div>

        </div>

    </div>

    <!-- ======================================== -->
    <!-- Footer                                   -->
    <!-- ======================================== -->

    <div class="jit-widget-footer">

        <i class="fa-regular fa-clock"></i>

        <span>

            Last updated just now

        </span>

    </div>

</div>
